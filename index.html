<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
button,.option,.btn{-webkit-user-select:none;user-select:none}
html,body{height:100%;overscroll-behavior:none}
body{

  background:#EBE4DB;
  color:#1C1C1E;

}
.app{

  margin:0 auto;
  height:100vh;
  height:100dvh;
  position:relative;
  overflow:hidden;

}
.statusbar{

  justify-content:space-between;
  padding:0 24px 4px;

}
.statusbar .icons{display:flex;gap:5px;align-items:center;font-size:14px}
.navbar{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:0 16px;
}
.navbar .back{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#FF6B35;
  font-size:17px;
  font-weight:400;
  background:none;
  border:none;
  cursor:pointer;

  align-items:center;

}
.navbar .back span{font-size:22px;font-weight:300;margin-right:2px}
.navbar .title{font-size:17px;font-weight:600;letter-spacing:-.2px}

.screen{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  flex-direction:column;
  opacity:1;
  transform:translateX(0);
  transition:transform .4s cubic-bezier(.32,.72,0,1),opacity .3s;
}
.screen.enter-from-right{transform:translateX(100%);opacity:0}
.screen.enter-from-left{transform:translateX(-30%);opacity:0}
.screen.exit-to-left{transform:translateX(-30%);opacity:0}
.screen.exit-to-right{transform:translateX(100%);opacity:0}

.screen-content{
  flex:1;
  overflow-y:auto;
  padding:8px 20px 140px;
  -webkit-overflow-scrolling:touch;
}

/* Start screen */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100%;
  text-align:center;
  padding:20px 8px 60px;
}
.hero .udon-hero{
  width:200px;
  height:200px;
  margin-bottom:4px;
  filter:drop-shadow(0 14px 22px rgba(255,107,53,.25));
  animation:float 3.5s ease-in-out infinite;
}
.hero .udon-hero svg{width:100%;height:100%}
.floating-bits{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.floating-bits .bit{
  position:absolute;
  width:36px;height:36px;
}
.floating-bits .b1{top:20px;left:-10px;animation:float 3s ease-in-out infinite .3s}
.floating-bits .b2{top:40px;right:-14px;animation:float 3.2s ease-in-out infinite .6s}
.floating-bits .b3{bottom:30px;right:4px;animation:float 3.4s ease-in-out infinite .9s}
.hero-wrap{position:relative;width:200px;height:200px;margin-bottom:12px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero h1{
  font-size:32px;
  font-weight:800;
  letter-spacing:-.8px;
  margin:8px 0 10px;
  color:#1C1C1E;
}
.hero h1 .accent{
  background:linear-gradient(135deg,#FF6B35,#D84315);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero .subtitle{
  font-size:15px;
  color:#636366;
  line-height:1.6;
  max-width:300px;
  margin:0 auto 24px;
}
.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:8px;
}
.chip{
  font-size:12px;
  background:#fff;
  padding:7px 12px;
  border-radius:20px;
  color:#3A3A3C;
  font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}

/* Progress */
.progress-wrap{padding:4px 20px 14px}
.progress{
  display:flex;
  gap:5px;
}
.progress .dot{
  height:4px;
  flex:1;
  background:rgba(0,0,0,.08);
  border-radius:2px;
  transition:background .35s ease;
  overflow:hidden;
  position:relative;
}
.progress .dot.active{background:#FF6B35}
.progress .dot.current{
  background:rgba(0,0,0,.08);
}
.progress .dot.current::after{
  content:'';
  position:absolute;
  inset:0;
  background:#FF6B35;
  animation:fillBar .4s ease forwards;
  transform-origin:left;
}
@keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.question-header{padding:4px 4px 16px}
.question-header .num{
  font-size:12px;
  font-weight:700;
  color:#FF6B35;
  letter-spacing:1.2px;
  margin-bottom:6px;
}
.question-header h2{
  font-size:25px;
  font-weight:800;
  letter-spacing:-.4px;
  line-height:1.3;
}

/* Option cards */
.options{display:flex;flex-direction:column;gap:10px}
.option{
  background:#fff;
  border-radius:16px;
  padding:16px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  border:2px solid transparent;
  width:100%;
  text-align:left;
  cursor:pointer;
  transition:transform .15s,box-shadow .2s,border-color .2s,background .2s;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  font-family:inherit;
  color:inherit;
  font-size:16px;
  position:relative;
}
.option:active{transform:scale(.97)}
.option.selected{
  border-color:#FF6B35;
  background:#FFF8F4;
  box-shadow:0 4px 16px rgba(255,107,53,.2);
}
.option .icon{
  font-size:32px;
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  background:#FFF3ED;
  border-radius:12px;
}
.option.selected .icon{background:#FFE4D3}
.option .content{flex:1;min-width:0}
.option .label{font-weight:700;margin-bottom:2px;letter-spacing:-.2px}
.option .desc{font-size:12px;color:#8E8E93;font-weight:500}
.option .chev{color:#D1D1D6;font-size:16px;font-weight:400}
.option.selected .chev{color:#FF6B35}
.option.selected .chev::before{content:'✓';font-size:16px;font-weight:700}
.option:not(.selected) .chev::before{content:'›';font-size:22px;font-weight:300}

/* CTA */
.cta-area{
  position:absolute;
  left:0;right:0;bottom:0;
  padding:16px 20px calc(20px + env(safe-area-inset-bottom,0));
  background:linear-gradient(180deg,transparent 0,rgba(248,243,238,.9) 30%,#F2EADF 100%);
  pointer-events:none;
}
.cta-area > *{pointer-events:auto}
.btn{
  background:linear-gradient(135deg,#FF6B35,#E85A2C);
  color:#fff;
  border:none;
  border-radius:26px;
  padding:17px 24px;
  font-size:17px;
  font-weight:700;
  width:100%;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(255,107,53,.35);
  transition:transform .15s,opacity .2s,box-shadow .2s;
  font-family:inherit;
  letter-spacing:-.2px;
}
.btn:active{transform:scale(.97)}
.btn[disabled]{opacity:.35;box-shadow:none;cursor:not-allowed}
.btn.secondary{
  background:#fff;
  color:#FF6B35;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.btn.ghost{
  background:rgba(255,255,255,.6);
  color:#3A3A3C;
  box-shadow:none;
  font-weight:600;
}

/* Result */
.result-label{
  text-align:center;
  padding:12px 0 4px;
}
.result-label .tag-top{
  display:inline-block;
  font-size:11px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg,#FF6B35,#E85A2C);
  padding:5px 12px;
  border-radius:12px;
  letter-spacing:1.5px;
  margin-bottom:8px;
  box-shadow:0 4px 10px rgba(255,107,53,.25);
}
.result-label h2{
  font-size:20px;
  font-weight:800;
  letter-spacing:-.3px;
  line-height:1.3;
}

.store-card{

}

  margin-bottom:10px;

.store-card .store-emoji svg{

  height:150px;

.store-card .area-badge{

  font-size:11px;
  font-weight:700;
  color:#FF6B35;
  background:#FFF3ED;
  padding:4px 10px;
  border-radius:10px;
  margin-bottom:8px;
}
.store-card h3{
  font-size:25px;
  font-weight:800;
  margin-bottom:12px;
  letter-spacing:-.4px;
}
.store-card .desc{
  font-size:14px;
  color:#3A3A3C;
  line-height:1.65;
  margin-bottom:16px;
  -webkit-user-select:text;user-select:text;
}
.match-score{
  display:flex;
  align-items:center;
  gap:10px;
  background:#FFF8F4;
  padding:10px 14px;
  border-radius:12px;
  margin-bottom:14px;
}
.match-score .label{font-size:12px;color:#8E8E93;font-weight:600}
.match-score .bar{
  flex:1;
  height:6px;
  background:#F2F2F7;
  border-radius:3px;
  overflow:hidden;
}
.match-score .bar-fill{
  height:100%;
  background:linear-gradient(90deg,#FF6B35,#FFAB40);
  border-radius:3px;
  transition:width 1s cubic-bezier(.32,.72,0,1);
}
.match-score .pct{font-size:13px;font-weight:800;color:#FF6B35;min-width:34px;text-align:right}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{
  font-size:11px;
  background:#F2F2F7;
  color:#3A3A3C;
  padding:5px 10px;
  border-radius:8px;
  font-weight:600;
}
.tag.match{background:#E8F5E9;color:#2E7D32}
.tag.match::before{content:'✓ '}

.map-link{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  background:#F2F2F7;
  color:#007AFF;
  padding:13px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
  transition:background .2s,transform .15s;
}
.map-link:active{background:#E5E5EA;transform:scale(.98)}

.alt-section{margin-top:24px}
.alt-section h4{
  font-size:12px;
  font-weight:700;
  color:#636366;
  letter-spacing:1.5px;
  margin-bottom:10px;
  padding-left:4px;
}
.alt-card{
  background:#fff;
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);

  width:100%;
  text-align:left;

}
.alt-card:active{transform:scale(.98)}
.alt-card .alt-emoji{
  width:48px;

  border-radius:12px;
  flex-shrink:0;
}
.alt-card .alt-emoji svg{width:44px;height:44px}
.alt-card .alt-content{flex:1;min-width:0}
.alt-card .alt-name{font-weight:700;font-size:15px;margin-bottom:2px;letter-spacing:-.2px}
.alt-card .alt-meta{font-size:12px;color:#8E8E93;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alt-card .alt-chev{color:#C7C7CC;font-size:20px;font-weight:300}

.restart-row{display:flex;gap:10px;margin-top:20px;padding:0 4px}
.restart-row .btn{flex:1;padding:14px 20px;font-size:15px}

.footer-note{
  text-align:center;
  font-size:11px;
  color:#8E8E93;
  margin-top:14px;
  padding:0 10px;
  line-height:1.5;
}
</style>
</head>

function progressHTML(){
  const total = questions.length;
  const cur = state.step;
  let html = '<div class="progress-wrap"><div class="progress">';

    else if(i === cur) cls += ' active current';
    html += `<div class="${cls}"></div>`;

  html += '</div></div>';
  return html;
}

function renderQuestion(){

  const a = state.answers[q.key];
  const isLast = state.step === questions.length - 1;
  let optionsHTML = '';
  for(const opt of q.options){
    const sel = a === opt.value ? ' selected' : '';
    optionsHTML += `
      <button class="option${sel}" onclick="selectOption('${q.key}','${opt.value}')">

  }
  const btnLabel = isLast ? '結果を見る' : '次へ';
  const disabled = a ? '' : 'disabled';

      <div class="cta-area">
        <button class="btn" ${disabled} onclick="nextStep()">${btnLabel}</button>
      </div>
    </div>
  `;

function scoreStore(store, a){
  let s = 0, matches = [];
  // area: heavy weight
  if(a.area){
    if(store.area === a.area){ s += 6; matches.push('area'); }
    else s -= 3;
  }
  if(a.noodle && a.noodle !== 'any' && store.noodle === a.noodle){ s += 3; matches.push('noodle'); }
  if(a.dashi && a.dashi !== 'any'){
    if(store.dashi === a.dashi){ s += 3; matches.push('dashi'); }
    else if(store.dashi === 'any') s += 1;
  }
  if(a.style && a.style !== 'any' && store.style === a.style){ s += 3; matches.push('style'); }
  if(a.menu && store.menu === a.menu){ s += 4; matches.push('menu'); }
  if(a.queue){
    if(a.queue === 'avoid'){
      if(store.queue === 'quiet'){ s += 3; matches.push('queue'); }
      else if(store.queue === 'normal') s += 1;
      else s -= 3;
    } else if(a.queue === 'normal'){
      if(store.queue === 'normal'){ s += 2; matches.push('queue'); }
      else if(store.queue === 'quiet') s += 1;
    } else if(a.queue === 'ok'){
      if(store.queue === 'crowded'){ s += 2; matches.push('queue'); }
    }
  }
  return {score:s, matches};
}

function computeResults(){
  const a = state.answers;
  const scored = stores.map(st => {
    const {score, matches} = scoreStore(st, a);
    return {store:st, score, matches};
  });
  scored.sort((x,y) => {
    if(y.score !== x.score) return y.score - x.score;
    return Math.random() - 0.5;
  });
  return scored;
}

function mapURL(name){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(name + ' 香川 うどん');
}

function renderResult(){
  const results = computeResults();
  const top = results[0];
  const alts = results.slice(1, 4);
  const maxScore = 22; // approximate max
  const pct = Math.max(30, Math.min(99, Math.round(top.score / maxScore * 100)));

  const s = top.store;
  const matchSet = new Set(top.matches);
  const tagsHTML = [
    {key:'area',label:areaNames[s.area]},
    {key:'style',label:styleNames[s.style]},
    {key:'menu',label:'名物: ' + menuNames[s.menu]},
    {key:'noodle',label:'麺: ' + noodleNames[s.noodle]},
    {key:'dashi',label:'出汁: ' + dashiNames[s.dashi]},
    {key:'queue',label:queueNames[s.queue]}
  ].map(t => `<div class="tag${matchSet.has(t.key)?' match':''}">${t.label}</div>`).join('');

  let altsHTML = '';
  for(const a of alts){
    altsHTML += `
      <a class="alt-card" href="${mapURL(a.store.name)}" target="_blank" rel="noopener">
        <div class="alt-emoji">${udonIcon(a.store.menu, 44)}</div>
        <div class="alt-content">
          <div class="alt-name">${a.store.name}</div>
          <div class="alt-meta">${areaNames[a.store.area]} ・ ${menuNames[a.store.menu]} ・ ${styleNames[a.store.style]}</div>
        </div>
        <div class="alt-chev">›</div>
      </a>`;
  }

  return `
    ${statusBarHTML()}
    ${navBarHTML('診断結果', true)}
    <div class="screen">
      <div class="screen-content">
        <div class="result-label">
          <div class="tag-top">あなたの運命の一杯</div>
          <h2>この店で間違いなし！</h2>
        </div>
        <div class="store-card">
          <div class="store-emoji">${udonIcon(s.menu, 150)}</div>
          <div style="text-align:center">
            <div class="area-badge">📍 ${areaNames[s.area]}</div>
          </div>
          <h3 style="text-align:center">${s.name}</h3>
          <div class="match-score">
            <div class="label">マッチ度</div>
            <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
            <div class="pct">${pct}%</div>
          </div>
          <div class="desc">${s.desc}</div>
          <div class="tags">${tagsHTML}</div>
          <a class="map-link" href="${mapURL(s.name)}" target="_blank" rel="noopener">
            <span>🗺️</span><span>Google マップで開く</span>
          </a>
        </div>
        <div class="alt-section">
          <h4>他のおすすめ候補</h4>
          ${altsHTML}
        </div>
        <div class="restart-row">
          <button class="btn ghost" onclick="shareResult('${s.name}')">シェア</button>
          <button class="btn" onclick="restart()">もう一度診断</button>
        </div>
        <div class="footer-note">
          ※ 営業時間・定休日は各店舗の公式情報をご確認ください。<br>行列店は時間に余裕を持ってお出かけを🙏
        </div>
      </div>
    </div>
  `;
}

function render(){
  let html;
  if(state.step === -1) html = renderStart();
  else if(state.step >= questions.length) html = renderResult();
  else html = renderQuestion();
  app.innerHTML = html;
  if(state.step >= questions.length){
    requestAnimationFrame(() => {
      const bar = document.getElementById('barFill');
      if(bar){
        const pctMatch = app.querySelector('.pct');
        if(pctMatch) bar.style.width = pctMatch.textContent;
      }
    });
  }
}

function startQuestions(){
  state.step = 0;
  state.direction = 'forward';
  render();
}

function selectOption(key, value){
  state.answers[key] = value;
  render();
}

function nextStep(){
  const q = questions[state.step];
  if(!state.answers[q.key]) return;
  state.step += 1;
  state.direction = 'forward';
  render();
}

function goBack(){
  if(state.step > 0) state.step -= 1;
  else if(state.step === 0) state.step = -1;
  else if(state.step >= questions.length) state.step = questions.length - 1;
  state.direction = 'back';
  render();
}

function restart(){
  state.step = -1;
  state.answers = {};
  render();
}

function shareResult(name){
  const text = `讃岐うどん診断で「${name}」がおすすめされた🍜 #讃岐うどん診断`;
  if(navigator.share){
    navigator.share({title:'讃岐うどん診断',text:text}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      alert('結果をコピーしました！\n\n' + text);
    });
  } else {
    alert(text);
  }
}

render();
// Update clock once per minute
setInterval(() => {
  const sb = document.querySelector('.statusbar > div:first-child');
  if(sb) sb.textContent = now();
}, 30000);
</script>
